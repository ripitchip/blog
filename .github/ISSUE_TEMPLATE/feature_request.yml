name: Feature request
description: Suggest an improvement for the theme.
title: 'feat: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please keep requests focused and tied to real use cases.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
      placeholder: 'It would help if ...'
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other ideas you evaluated.

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Who benefits and what might change?

  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I checked existing issues and discussions first.
          required: true
