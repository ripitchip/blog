name: Bug report
description: Report a reproducible problem in the theme.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please provide enough detail for others to reproduce quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, numbered steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: bun --version

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 136 / Firefox 128 / Safari 18

  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I ran `bun run typecheck` and `bun run lint`.
          required: false
        - label: I verified this issue is not already reported.
          required: true
